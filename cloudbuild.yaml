steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_FIREBASE_API_KEY=${_FIREBASE_API_KEY}
      - --build-arg
      - VITE_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}
      - --build-arg
      - VITE_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}
      - --build-arg
      - VITE_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}
      - --build-arg
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg
      - VITE_FIREBASE_APP_ID=${_FIREBASE_APP_ID}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
      - --region
      - ${_REGION}
      - --project
      - $PROJECT_ID
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --update-env-vars
      - DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},INSTANCE_UNIX_SOCKET=/cloudsql/${_CLOUD_SQL_CONNECTION},GCS_BUCKET=${_UPLOADS_BUCKET},FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID},OPENAI_MODEL=${_OPENAI_MODEL},ALLOWED_ORIGIN=${_ALLOWED_ORIGIN}
      - --update-secrets
      - DB_PASS=${_DB_PASS_SECRET}:latest,JWT_SECRET=${_JWT_SECRET}:latest,OPENAI_API_KEY=${_OPENAI_API_KEY_SECRET}:latest
      - --add-cloudsql-instances
      - ${_CLOUD_SQL_CONNECTION}
      - --allow-unauthenticated
      - --quiet
images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:${_TAG}
options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true
substitutions:
  _REGION: asia-northeast1
  _REPOSITORY: next-market-repo
  _IMAGE: next-market
  _SERVICE: next-market
  _TAG: latest
  _DB_USER: nextmarket
  _DB_NAME: nextmarket
  _DB_PASS_SECRET: next-market-db-password
  _JWT_SECRET: next-market-jwt-secret
  _OPENAI_API_KEY_SECRET: next-market-openai-api-key
  _OPENAI_MODEL: gpt-4o-mini
  _ALLOWED_ORIGIN: https://hackathon-brown-gamma.vercel.app
  _RUNTIME_SERVICE_ACCOUNT: next-market-run@${PROJECT_ID}.iam.gserviceaccount.com
  _UPLOADS_BUCKET: ${PROJECT_ID}-next-market-uploads
  _CLOUD_SQL_CONNECTION: ${PROJECT_ID}:asia-northeast1:next-market-mysql
  _FIREBASE_API_KEY: AIzaSyC6-mOjVjM98YSVDijlQoExpVjL7sT1dfY
  _FIREBASE_PROJECT_ID: uttc-hackathon-a14e6
  _FIREBASE_AUTH_DOMAIN: uttc-hackathon-a14e6.firebaseapp.com
  _FIREBASE_STORAGE_BUCKET: uttc-hackathon-a14e6.firebasestorage.app
  _FIREBASE_MESSAGING_SENDER_ID: "493961426414"
  _FIREBASE_APP_ID: "1:493961426414:web:7323345cdc74cfc3064aff"
