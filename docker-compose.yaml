services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nextmarket
      MYSQL_USER: nextmarket
      MYSQL_PASSWORD: nextmarket
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unextmarket", "-pnextmarket"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql-data:
